# ============================================================
# Nginx — Portal Corporativo Incerpaz
# Copia a: /etc/nginx/sites-available/incerpaz
# Activar: sudo ln -s /etc/nginx/sites-available/incerpaz /etc/nginx/sites-enabled/
#
# Ajustar: RUTA_PROYECTO con la ruta real en el VPS
# ============================================================

# Cambia esto por la ruta donde clonaste el repo en el VPS
# Ejemplo: /home/antonio/corporacion_incerpaz
# Se usa como variable para no repetirla abajo
# (Nginx no tiene variables globales, reemplazá manualmente si es necesario)

server {
    listen 80;
    server_name _;   # acepta cualquier nombre/IP; cambiá por tu dominio cuando tengas

    # Tamaño máximo de archivo (para subida de Excel/PDF)
    client_max_body_size 30M;

    # ── Cabeceras de seguridad ──────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"                 always;

    # ── Login — rate limiting estricto ─────────────────────────────────────
    location /api/token/ {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API Django ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;             # para subida de Excel grandes
    }

    # ── Admin Django — solo acceso restringido ─────────────────────────────
    # Descomentá y poné tu IP real para bloquear el admin al exterior
    # location /admin/ {
    #     allow  TU_IP_PERSONAL;     # ej: 200.10.20.30
    #     deny   all;
    #     proxy_pass       http://127.0.0.1:8000;
    #     proxy_set_header Host            $host;
    #     proxy_set_header X-Real-IP       $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
    # Por ahora sin restricción de IP (descomentá arriba cuando quieras protegerlo):
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Archivos estáticos Django (CSS/JS del admin) ───────────────────────
    # Ajustá la ruta si clonaste en otro lugar
    location /static/ {
        alias   /home/antonio/corporacion_incerpaz/backend/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend React (SPA) ───────────────────────────────────────────────
    root  /home/antonio/corporacion_incerpaz/frontend/dist;
    index index.html;

    location / {
        # React Router: si el archivo no existe, devolver index.html
        try_files $uri $uri/ /index.html;
        expires -1;    # HTML no se cachea (siempre fresh)
    }

    # Assets del build (JS/CSS con hash en el nombre) — cache agresivo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================================
# HTTPS — descomentar y ejecutar: sudo certbot --nginx -d tudominio.com
# Certbot lo configura automáticamente cuando tengas un dominio.
# ============================================================
