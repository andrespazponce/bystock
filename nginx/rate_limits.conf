# Definición de zonas de rate limiting.
# Este archivo va en /etc/nginx/conf.d/ (se carga dentro del bloque http).

# Zona para el endpoint de login: limita por IP
# 10m = 10 MB de memoria (aprox. 160.000 IPs)
# rate=5r/m = máximo 5 peticiones por minuto por IP
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Zona para la API general: más permisiva
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
